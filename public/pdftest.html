<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<style>
  html, body { margin: 0; height: 100%; }
  .screen { position: fixed; inset: 0; display: flex; flex-direction: column; background: #000; }
  .topbar { height: 52px; background: #000; color: #fff; flex: none; display:flex; align-items:center; padding:0 12px; font-family: sans-serif; }
  .viewer { position: relative; flex: 1; min-height: 0; overflow: hidden; }
  .pages {
    width: 100%; height: 100%;
    overflow-y: auto; overflow-x: hidden;
    -webkit-overflow-scrolling: touch;
    touch-action: pan-x pan-y pinch-zoom;
    background: #525659;
    display: flex; flex-direction: column; align-items: center; gap: 8px; padding: 8px 0;
  }
  .pages canvas { display: block; max-width: 100%; height: auto; box-shadow: 0 2px 8px rgba(0,0,0,.35); }
  #status { color:#fff; font-family: sans-serif; padding: 8px 12px; position:absolute; z-index:5; }
</style>
</head>
<body>
<div class="screen">
  <div class="topbar">TEST viewer PDF</div>
  <div class="viewer">
    <div id="status">se încarcă…</div>
    <div class="pages" id="pages"></div>
  </div>
</div>
<script type="module">
import * as pdfjsLib from '/pdf.min.mjs';
pdfjsLib.GlobalWorkerOptions.workerSrc = '/pdf.worker.min.mjs';
const status = document.getElementById('status');
const container = document.getElementById('pages');
const url = 'https://profesorjitaruionel.com/wp-content/uploads/2026/06/E_c_istorie_2026_var_03_LRO.pdf';
(async () => {
  try {
    const doc = await pdfjsLib.getDocument({ url, withCredentials: false }).promise;
    status.textContent = 'pagini: ' + doc.numPages;
    const dpr = window.devicePixelRatio || 1;
    const cw = container.clientWidth;
    for (let i = 1; i <= doc.numPages; i++) {
      const page = await doc.getPage(i);
      const v1 = page.getViewport({ scale: 1 });
      const vp = page.getViewport({ scale: (cw / v1.width) * dpr });
      const canvas = document.createElement('canvas');
      canvas.width = vp.width; canvas.height = vp.height;
      canvas.style.width = cw + 'px';
      canvas.style.height = ((cw / v1.width) * v1.height) + 'px';
      container.appendChild(canvas);
      await page.render({ canvasContext: canvas.getContext('2d'), viewport: vp }).promise;
    }
    status.textContent = 'gata · scrollH=' + container.scrollHeight + ' clientH=' + container.clientHeight + ' scrollabil=' + (container.scrollHeight > container.clientHeight);
    setTimeout(() => status.style.display = 'none', 4000);
  } catch (e) {
    status.textContent = 'EROARE: ' + (e && e.message ? e.message : e);
  }
})();
</script>
</body>
</html>
