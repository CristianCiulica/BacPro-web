<!doctype html>
<html lang="ro">
<head>
  <meta charset="utf-8">
  <title>BacPro</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#F5F7FA">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="BacPro">
  <link rel="icon" type="image/png" href="assets/images/app_icon.png">
  <link rel="apple-touch-icon" href="assets/images/app_icon.png">
  <link rel="manifest" href="manifest.webmanifest">
  <script>
    // aplică tema salvată înainte de încărcarea aplicației (fără flash)
    try {
      if (localStorage.getItem('bacpro_theme_v1') === 'dark') {
        document.documentElement.classList.add('dark');
        document.querySelector('meta[name="theme-color"]').setAttribute('content', '#0A0C12');
      }
    } catch (e) {}
  </script>
</head>
<body>
  <app-root></app-root>
  <noscript>Please enable JavaScript to continue using this application.</noscript>
</body>
</html>
